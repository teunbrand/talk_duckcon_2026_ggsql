meta:
  name: ggsql
  link: https://ggsql.org

logo:
  small: assets/icon.svg
  medium: assets/logo.png

color:
  palette:
    black: "#001219"
    white: "#F9F9F9"
    darkteal: "#005F73"
    teal: "#0A9396"
    lightteal: "#94D2BD"
    paleyellow: "#E9D8A6"
    paleteal: "#DEF1EB"
  foreground: black
  background: white
  primary: darkteal
  secondary: teal
  tertiary: lightteal
  info: paleyellow

typography:
  fonts:
    - family: Nunito Sans
      source: google
    - family: Fira Code
      source: google

  base: Nunito Sans
  headings:
    family: Nunito Sans
    weight: 400
  monospace: Fira Code

defaults:
  bootstrap:
    defaults:
      navbar-bg: $brand-paleteal
      navbar-fg: $brand-darkteal
      navbar-hl: $brand-black
